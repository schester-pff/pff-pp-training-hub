<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach — PP Training Assistant | PFF Enterprise</title>
<style>
  :root {
    --night2: #1F1F22;
    --night1: #38383E;
    --blue: #1A6AFF;
    --blue-dim: rgba(26,106,255,0.12);
    --blue-border: rgba(26,106,255,0.25);
    --white: #FFFFFF;
    --light1: #F2F5FA;
    --light2: #C0C3CC;
    --green: #009657;
    --surface: #28282C;
    --surface2: #303036;
    --border: rgba(255,255,255,0.07);
    --text: #E8EAF0;
    --text-dim: #9096A8;
    --accent: #EAB308;
    --accent-dim: rgba(234,179,8,0.1);
    --accent-border: rgba(234,179,8,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--night2);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: #000;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .header-logo img { height: 28px; width: auto; }

  .header-badge {
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .hub-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim); text-decoration: none;
    font-size: 12px; font-weight: 600;
    padding: 6px 12px; border-radius: 6px;
    transition: all 0.15s;
    border: 1px solid var(--border);
  }
  .hub-link:hover { color: var(--white); border-color: rgba(255,255,255,0.15); }

  .trainee-badge {
    background: var(--blue-dim);
    border: 1px solid var(--blue-border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    display: none;
  }
  .trainee-badge.visible { display: block; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ── LOGIN SCREEN — hidden by default, redirect fires before shown ── */
  #login-screen { display: none !important; }
  #login-screen-x {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
    gap: 28px;
  }

  .coach-avatar {
    width: 80px; height: 80px;
    background: #FFC107;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
    box-shadow: 0 8px 32px rgba(234,179,8,0.25);
  }
  .coach-icon {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 18px;
    color: #1F1F22; letter-spacing: 0;
  }


  /* ── CHAT SCREEN ── */
  #chat-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    padding-top: 16px;
  }

  #chat-screen.visible { display: flex; }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    min-height: 0;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--night1); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.coach {
    background: #000;
    overflow: hidden;
    border-radius: 9px;
    padding: 0;
  }

  .msg-avatar.user {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 11px;
  }

  .msg-bubble {
    max-width: calc(100% - 52px);
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
  }

  .message.coach .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .msg-bubble {
    background: var(--blue);
    border-top-right-radius: 4px;
    color: white;
  }

  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { color: var(--white); font-weight: 700; }
  .message.user .msg-bubble strong { color: white; }
  .msg-bubble ul, .msg-bubble ol { margin: 8px 0 8px 20px; }
  .msg-bubble li { margin-bottom: 4px; }
  .msg-resource:hover { background: rgba(234,179,8,0.18); }

  /* ── TYPING ── */
  .typing-indicator {
    display: flex; gap: 10px; align-items: flex-start;
  }

  .typing-dots {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; border-top-left-radius: 4px;
    padding: 14px 18px;
    display: flex; gap: 5px; align-items: center;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--text-dim); border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── SUGGESTIONS ── */
  .suggestions {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .suggestion-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .suggestion-chip:hover {
    border-color: var(--accent-border);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── INPUT ── */
  .input-area {
    padding: 12px 0 24px;
    flex-shrink: 0;
  }

  .input-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex; align-items: flex-end; gap: 8px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within { border-color: rgba(234,179,8,0.4); }

  .input-wrapper textarea {
    flex: 1;
    background: none; border: none; outline: none;
    font-family: 'Outfit', sans-serif;
    font-size: 14px; color: var(--text);
    resize: none; max-height: 120px;
    line-height: 1.5; padding: 2px 0;
  }

  .input-wrapper textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 36px; height: 36px;
    background: var(--accent);
    border: none; border-radius: 9px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; fill: #000; }

  /* ── SPINNER ── */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DISCLAIMER ── */
  .disclaimer {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 0 0 8px;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    .header { padding: 0 16px; }
    .suggestion-chip { font-size: 11px; padding: 6px 11px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Barlow+Condensed:wght@800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript></noscript>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="header-logo">
      <img src="logo.png" alt="PFF Enterprise" />
    </div>
    <span class="header-badge">Coach — PP Training Assistant</span>
  </div>
  <div class="header-right">
    <a href="index.html" class="hub-link">← Back to Hub</a>
    <div class="trainee-badge" id="trainee-badge"></div>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LOGIN -->
  <!-- CHAT -->
  <div id="chat-screen">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="suggestions" id="suggestions">
        <button class="suggestion-chip" onclick="useSuggestion(this)">What are the most important errors to avoid?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">SSR vs SCBR — what's the difference?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">When does a TE become a WR?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">How do extensions work?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">How do I prepare for my final test?</button>
      </div>
      <div class="input-wrapper">
        <textarea
          id="chat-input"
          placeholder="Ask Coach anything about PP training..."
          rows="1"
          onkeydown="handleKeydown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="disclaimer">Coach is an AI assistant. For critical decisions always verify in the PP Guide or speak to your trainer.</div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──
const COACH_FUNCTION_URL = '/.netlify/functions/coach';
const UNANSWERED_FORM_URL = 'https://forms.gle/j1qvYifoUWCndaVK7';
const TEST_EMAIL = 'bob@bob.com';
const COACH_AVATAR_DIV = '<div class="msg-avatar coach"><span class="coach-icon">C</span></div>';


// ── STATE ──
let traineeEmail = '';
let traineeName = '';
let weekAccess = 1;
let conversationHistory = [];
let isLoading = false;

// ── LOGIN ──
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const urlName = params.get('name');
  const urlEmail = params.get('email');

  // Valid Hub handoff — URL params present
  if (urlName && urlEmail) {
    traineeEmail = decodeURIComponent(urlEmail);
    traineeName = decodeURIComponent(urlName);
    weekAccess = parseInt(params.get('weekAccess')) || 1;
    localStorage.setItem('pff_coach_session', JSON.stringify({
      email: traineeEmail,
      name: traineeName,
      weekAccess: weekAccess
    }));
    showChat();
    return;
  }

  // Valid saved session from a previous Hub visit
  const saved = localStorage.getItem('pff_coach_session');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.email && data.name) {
        traineeEmail = data.email;
        traineeName = data.name;
        weekAccess = parseInt(data.weekAccess) || 1;
        showChat();
        return;
      }
    } catch(e) { localStorage.removeItem('pff_coach_session'); }
  }

  // No valid session — redirect to Hub immediately, no login form
  window.location.replace('index.html');
});

function showChat() {
  document.getElementById('chat-screen').classList.add('visible');

  const badge = document.getElementById('trainee-badge');
  if (traineeName) {
    badge.textContent = traineeName;
    badge.classList.add('visible');
  }

  sendWelcome();
  document.getElementById('chat-input').focus();
}

// ── WELCOME MESSAGE ──
async function sendWelcome() {
  const firstName = traineeName.split(' ')[0];
  const welcomePrompt = `The trainee ${firstName} has just opened Coach for the first time. Give them a brief, warm welcome — 2 sentences max. Tell them your name is Coach and what you can help with. Be direct and friendly, not corporate. End with something that invites them to ask their first question.`;

  await callAPI(welcomePrompt, true);
}

// ── MESSAGING ──
function useSuggestion(el) {
  const text = el.textContent;
  document.getElementById('chat-input').value = text;
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  await callAPI(null, false);
}

async function callAPI(overridePrompt, isWelcome) {
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const typingId = 'typing-' + Date.now();
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.id = typingId;
  typingEl.innerHTML = `
    ${COACH_AVATAR_DIV}
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  document.getElementById('messages').appendChild(typingEl);
  scrollBottom();

  try {
    const messages = overridePrompt
      ? [{ role: 'user', content: overridePrompt }]
      : conversationHistory;

    const response = await fetch(COACH_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'chat',
        messages: messages,
        weekAccess: weekAccess || 1
      })
    });

    const data = await response.json();
    const replyText = data.reply || "Sorry, something went wrong. Please try again or post in pp-training on Discord.";

    document.getElementById(typingId)?.remove();
    addMessage('coach', replyText);

    if (!isWelcome) {
      conversationHistory.push({ role: 'assistant', content: replyText });
    }

    // Keep history manageable
    if (conversationHistory.length > 10) {
      conversationHistory = conversationHistory.slice(-10);
    }

  } catch(err) {
    document.getElementById(typingId)?.remove();
    addMessage('coach', "Sorry, I couldn't connect. Check your connection and try again, or post your question in pp-training on Discord.");
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
}

function addMessage(role, text) {
  const messages = document.getElementById('messages');
  const msgEl = document.createElement('div');
  msgEl.className = `message ${role}`;

  const avatar = role === 'coach'
    ? COACH_AVATAR_DIV
    : '<div class="msg-avatar user">You</div>';

  msgEl.innerHTML = `${avatar}<div class="msg-bubble">${formatText(text)}</div>`;
  messages.appendChild(msgEl);
  scrollBottom();
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#6fa3ff;text-decoration:underline;">$1</a>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>')
    .replace(/<p>([-•]\s)(.*?)<\/p>/g, '<ul><li>$2</li></ul>')
    .replace(/<\/ul><ul>/g, '');
}

function scrollBottom() {
  const messages = document.getElementById('messages');
  setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 50);
}

</script>
</body>
</html>
